[tool.poe]
envfile = "${POE_ROOT}/.env"

[tool.poe.tasks]
fmt = "ruff format"

[tool.poe.tasks.setup]
sequence = ["west-update", "sdk-install", "blobs-fetch", "patch-zenoh"]
help = "First-time workspace setup: fetch west deps, install Zephyr SDK, fetch binary blobs, apply patches. Safe to re-run."

[tool.poe.tasks.west-update]
cmd = "west update --narrow"
help = "Fetch/update all west dependencies into deps/"

[tool.poe.tasks.blobs-fetch]
cmd = "west blobs fetch hal_espressif"
help = "Fetch required binary blobs for the Espressif HAL (WiFi/BLE firmware)."

[tool.poe.tasks.patch-zenoh]
shell = '''
set -e
ZENOH_DIR="${POE_ROOT}/deps/modules/lib/zenoh"
CMAKE="${ZENOH_DIR}/zephyr/CMakeLists.txt"
CONFIG_H="${ZENOH_DIR}/include/zenoh-pico/config.h"

# 1. Rewrite the Zephyr-module CMakeLists.txt with our patched version.
# Differences from upstream (which is unmaintained: last meaningful change in
# 2024-06): glob picks up src/runtime/*.c, and source files referencing
# sock->_fd are dropped on serial-only builds (the field only exists when
# ZP_PLATFORM_SOCKET_LINKS_ENABLED, i.e. TCP/UDP/WS == 1).
cat > "$CMAKE" <<'EOF'
# Auto-generated by poe patch-zenoh - do not edit.
if(CONFIG_ZENOH_PICO)

zephyr_compile_definitions(ZENOH_ZEPHYR)
zephyr_include_directories(../include)
zephyr_library()

function(configure_zenoh_feature config)
  string(REPLACE CONFIG_ZENOH_PICO Z_FEATURE feature ${config})
  if(${config})
    zephyr_compile_definitions(${feature}=1)
  else()
    zephyr_compile_definitions(${feature}=0)
  endif()
endfunction()

configure_zenoh_feature(CONFIG_ZENOH_PICO_LINK_SERIAL)
configure_zenoh_feature(CONFIG_ZENOH_PICO_MULTI_THREAD)
configure_zenoh_feature(CONFIG_ZENOH_PICO_PUBLICATION)
configure_zenoh_feature(CONFIG_ZENOH_PICO_SUBSCRIPTION)
configure_zenoh_feature(CONFIG_ZENOH_PICO_QUERY)
configure_zenoh_feature(CONFIG_ZENOH_PICO_QUERYABLE)
configure_zenoh_feature(CONFIG_ZENOH_PICO_RAWETH_TRANSPORT)
configure_zenoh_feature(CONFIG_ZENOH_PICO_LINK_TCP)
configure_zenoh_feature(CONFIG_ZENOH_PICO_LINK_UDP_UNICAST)
configure_zenoh_feature(CONFIG_ZENOH_PICO_LINK_UDP_MULTICAST)
configure_zenoh_feature(CONFIG_ZENOH_PICO_SCOUTING)
configure_zenoh_feature(CONFIG_ZENOH_PICO_LINK_WS)

file(GLOB_RECURSE Sources
  "../src/api/*.c"
  "../src/collections/*.c"
  "../src/link/*.c"
  "../src/net/*.c"
  "../src/protocol/*.c"
  "../src/runtime/*.c"
  "../src/session/*.c"
  "../src/transport/*.c"
  "../src/utils/*.c"
  "../src/system/common/*.c"
)

file(GLOB Sources_Zephyr "../src/system/zephyr/*.c")
list(APPEND Sources ${Sources_Zephyr})

zephyr_library_sources(${Sources})
endif()
EOF
echo "zenoh zephyr/CMakeLists.txt rewritten"

# 2. Generate include/zenoh-pico/config.h. Upstream's zephyr/CMakeLists.txt
# does not run configure_file(config.h.in config.h), so the header that
# system/platform.h includes is missing on the west-module path. We synthesise
# a minimal version that pulls numeric tunables from the application's Kconfig
# (CONFIG_APP_ZENOH_*); Z_FEATURE_* macros are still injected via -D from
# zephyr/CMakeLists.txt. Always overwritten so it tracks Kconfig renames.
cat > "$CONFIG_H" <<'EOF'
/* Auto-generated by poe patch-zenoh - do not edit. */
#ifndef INCLUDE_ZENOH_PICO_CONFIG_H
#define INCLUDE_ZENOH_PICO_CONFIG_H

/* Z_FEATURE_* defaults matching the upstream root CMakeLists.txt. The 12
 * Kconfig-driven features are injected via -D from
 * deps/modules/lib/zenoh/zephyr/CMakeLists.txt and take precedence. The rest
 * come from here so source files don't reference helpers gated out by an
 * unrelated #if (e.g. tx.c calls _z_transport_batch_hold_*_mutex which only
 * exists when Z_FEATURE_BATCHING == 1). */
#ifndef Z_FEATURE_UNSTABLE_API
#define Z_FEATURE_UNSTABLE_API 0
#endif
#ifndef Z_FEATURE_CONNECTIVITY
#define Z_FEATURE_CONNECTIVITY 0
#endif
#ifndef Z_FEATURE_PUBLICATION
#define Z_FEATURE_PUBLICATION 1
#endif
#ifndef Z_FEATURE_ADVANCED_PUBLICATION
#define Z_FEATURE_ADVANCED_PUBLICATION 0
#endif
#ifndef Z_FEATURE_SUBSCRIPTION
#define Z_FEATURE_SUBSCRIPTION 1
#endif
#ifndef Z_FEATURE_ADVANCED_SUBSCRIPTION
#define Z_FEATURE_ADVANCED_SUBSCRIPTION 0
#endif
#ifndef Z_FEATURE_QUERY
#define Z_FEATURE_QUERY 1
#endif
#ifndef Z_FEATURE_QUERYABLE
#define Z_FEATURE_QUERYABLE 1
#endif
#ifndef Z_FEATURE_LIVELINESS
#define Z_FEATURE_LIVELINESS 1
#endif
#ifndef Z_FEATURE_INTEREST
#define Z_FEATURE_INTEREST 1
#endif
#ifndef Z_FEATURE_FRAGMENTATION
#define Z_FEATURE_FRAGMENTATION 1
#endif
#ifndef Z_FEATURE_ENCODING_VALUES
#define Z_FEATURE_ENCODING_VALUES 1
#endif
#ifndef Z_FEATURE_MULTI_THREAD
#define Z_FEATURE_MULTI_THREAD 1
#endif
#ifndef Z_FEATURE_LINK_TCP
#define Z_FEATURE_LINK_TCP 1
#endif
#ifndef Z_FEATURE_LINK_BLUETOOTH
#define Z_FEATURE_LINK_BLUETOOTH 0
#endif
#ifndef Z_FEATURE_LINK_WS
#define Z_FEATURE_LINK_WS 0
#endif
#ifndef Z_FEATURE_LINK_SERIAL
#define Z_FEATURE_LINK_SERIAL 0
#endif
#ifndef Z_FEATURE_LINK_SERIAL_USB
#define Z_FEATURE_LINK_SERIAL_USB 0
#endif
#ifndef Z_FEATURE_LINK_TLS
#define Z_FEATURE_LINK_TLS 0
#endif
#ifndef Z_FEATURE_SCOUTING
#define Z_FEATURE_SCOUTING 1
#endif
#ifndef Z_FEATURE_LINK_UDP_MULTICAST
#define Z_FEATURE_LINK_UDP_MULTICAST 1
#endif
#ifndef Z_FEATURE_LINK_UDP_UNICAST
#define Z_FEATURE_LINK_UDP_UNICAST 1
#endif
#ifndef Z_FEATURE_MULTICAST_TRANSPORT
#define Z_FEATURE_MULTICAST_TRANSPORT 1
#endif
#ifndef Z_FEATURE_UNICAST_TRANSPORT
#define Z_FEATURE_UNICAST_TRANSPORT 1
#endif
#ifndef Z_FEATURE_RAWETH_TRANSPORT
#define Z_FEATURE_RAWETH_TRANSPORT 0
#endif
#ifndef Z_FEATURE_TCP_NODELAY
#define Z_FEATURE_TCP_NODELAY 1
#endif
#ifndef Z_FEATURE_LOCAL_SUBSCRIBER
#define Z_FEATURE_LOCAL_SUBSCRIBER 0
#endif
#ifndef Z_FEATURE_SESSION_CHECK
#define Z_FEATURE_SESSION_CHECK 1
#endif
#ifndef Z_FEATURE_BATCHING
#define Z_FEATURE_BATCHING 1
#endif
#ifndef Z_FEATURE_BATCH_TX_MUTEX
#define Z_FEATURE_BATCH_TX_MUTEX 0
#endif
#ifndef Z_FEATURE_BATCH_PEER_MUTEX
#define Z_FEATURE_BATCH_PEER_MUTEX 0
#endif
#ifndef Z_FEATURE_MATCHING
#define Z_FEATURE_MATCHING 1
#endif
#ifndef Z_FEATURE_RX_CACHE
#define Z_FEATURE_RX_CACHE 0
#endif
#ifndef Z_FEATURE_UNICAST_PEER
#define Z_FEATURE_UNICAST_PEER 1
#endif
#ifndef Z_FEATURE_AUTO_RECONNECT
#define Z_FEATURE_AUTO_RECONNECT 1
#endif
#ifndef Z_FEATURE_MULTICAST_DECLARATIONS
#define Z_FEATURE_MULTICAST_DECLARATIONS 0
#endif
#ifndef Z_FEATURE_LOCAL_QUERYABLE
#define Z_FEATURE_LOCAL_QUERYABLE 0
#endif
#ifndef Z_FEATURE_ADMIN_SPACE
#define Z_FEATURE_ADMIN_SPACE 0
#endif

/* Numeric tunables driven by CONFIG_APP_ZENOH_* (see applications/rasprover/Kconfig). */
#define Z_FRAG_MAX_SIZE                 CONFIG_APP_ZENOH_FRAG_MAX_SIZE
#define Z_BATCH_UNICAST_SIZE            CONFIG_APP_ZENOH_BATCH_UNICAST_SIZE
#define Z_BATCH_MULTICAST_SIZE          CONFIG_APP_ZENOH_BATCH_MULTICAST_SIZE
#define Z_CONFIG_SOCKET_TIMEOUT         CONFIG_APP_ZENOH_SOCKET_TIMEOUT_MS
#define Z_TRANSPORT_LEASE               CONFIG_APP_ZENOH_TRANSPORT_LEASE_MS
#define Z_TRANSPORT_LEASE_EXPIRE_FACTOR CONFIG_APP_ZENOH_TRANSPORT_LEASE_EXPIRE_FACTOR
#define Z_RUNTIME_MAX_TASKS             CONFIG_APP_ZENOH_RUNTIME_MAX_TASKS
#define Z_TRANSPORT_ACCEPT_TIMEOUT      CONFIG_APP_ZENOH_TRANSPORT_ACCEPT_TIMEOUT_MS
#define Z_TRANSPORT_CONNECT_TIMEOUT     CONFIG_APP_ZENOH_TRANSPORT_CONNECT_TIMEOUT_MS

/* Runtime configuration property keys. Copied verbatim from
 * deps/modules/lib/zenoh/include/zenoh-pico/config.h.in (post-ZENOH_GENERIC
 * section) — these are protocol constants, not user-tunable. */
#define Z_CONFIG_MODE_KEY 0x40
#define Z_CONFIG_MODE_CLIENT "client"
#define Z_CONFIG_MODE_PEER "peer"
#define Z_CONFIG_MODE_DEFAULT Z_CONFIG_MODE_CLIENT
#define Z_CONFIG_CONNECT_KEY 0x41
#define Z_CONFIG_LISTEN_KEY 0x42
#define Z_CONFIG_USER_KEY 0x43
#define Z_CONFIG_PASSWORD_KEY 0x44
#define Z_CONFIG_MULTICAST_SCOUTING_KEY 0x45
#define Z_CONFIG_MULTICAST_SCOUTING_DEFAULT "true"
#define Z_CONFIG_MULTICAST_LOCATOR_KEY 0x46
#define Z_CONFIG_MULTICAST_LOCATOR_DEFAULT "udp/224.0.0.224:7446"
#define Z_CONFIG_SCOUTING_TIMEOUT_KEY 0x47
#define Z_CONFIG_SCOUTING_TIMEOUT_DEFAULT "1000"
#define Z_CONFIG_SCOUTING_WHAT_KEY 0x48
#define Z_CONFIG_SCOUTING_WHAT_DEFAULT "3"
#define Z_CONFIG_SESSION_ZID_KEY 0x49
#define Z_CONFIG_ADD_TIMESTAMP_KEY 0x4A
#define Z_CONFIG_ADD_TIMESTAMP_DEFAULT "false"

#define Z_CONFIG_TLS_ROOT_CA_CERTIFICATE_KEY 0x4B
#define Z_CONFIG_TLS_ROOT_CA_CERTIFICATE_BASE64_KEY 0x4C
#define Z_CONFIG_TLS_LISTEN_PRIVATE_KEY_KEY 0x4D
#define Z_CONFIG_TLS_LISTEN_PRIVATE_KEY_BASE64_KEY 0x4E
#define Z_CONFIG_TLS_LISTEN_CERTIFICATE_KEY 0x4F
#define Z_CONFIG_TLS_LISTEN_CERTIFICATE_BASE64_KEY 0x50
#define Z_CONFIG_TLS_ENABLE_MTLS_KEY 0x51
#define Z_CONFIG_TLS_CONNECT_PRIVATE_KEY_KEY 0x52
#define Z_CONFIG_TLS_CONNECT_PRIVATE_KEY_BASE64_KEY 0x53
#define Z_CONFIG_TLS_CONNECT_CERTIFICATE_KEY 0x54
#define Z_CONFIG_TLS_CONNECT_CERTIFICATE_BASE64_KEY 0x55
#define Z_CONFIG_TLS_VERIFY_NAME_ON_CONNECT_KEY 0x56

#define Z_ZID_LENGTH 16
#define Z_PROTO_VERSION 0x09
#define Z_JOIN_INTERVAL 2500
#define Z_SN_RESOLUTION 0x02
#define Z_REQ_RESOLUTION 0x02
#define Z_RX_CACHE_SIZE 10
#define Z_GET_TIMEOUT_DEFAULT 10000
#define Z_LISTEN_MAX_CONNECTION_NB 10
#define ZP_ASM_NOP __asm__("nop")

#endif /* INCLUDE_ZENOH_PICO_CONFIG_H */
EOF
echo "zenoh config.h written to $CONFIG_H"
'''
help = "Patch zenoh-pico Zephyr integration: add src/runtime sources, generate include/zenoh-pico/config.h from CONFIG_APP_ZENOH_*. Idempotent."

[tool.poe.tasks.sdk-install]
shell = """
set -e
SDK_VER=$(cat "${POE_ROOT}/deps/zephyr/SDK_VERSION")
west sdk install --version "$SDK_VER" \
  -t arm-zephyr-eabi \
     riscv64-zephyr-elf \
     xtensa-espressif_esp32_zephyr-elf \
     xtensa-espressif_esp32s3_zephyr-elf
"""
help = "Install Zephyr SDK toolchains for this project's targets (version read from deps/zephyr/SDK_VERSION)."

[tool.poe.tasks.app]
shell = """
set -e
case "${app}" in
    motor_controller)     ALLOWED="robotis_openrb_150"; DEFAULT="robotis_openrb_150" ;;
    joystick_controller)  ALLOWED="adafruit_qt_py_esp32s3/esp32s3/procpu"; DEFAULT="adafruit_qt_py_esp32s3/esp32s3/procpu" ;;
    embedded_vision)      ALLOWED="arduino_nicla_vision/stm32h747xx/m7"; DEFAULT="arduino_nicla_vision/stm32h747xx/m7" ;;
    force_sensor)         ALLOWED="adafruit_qt_py_esp32c3"; DEFAULT="adafruit_qt_py_esp32c3" ;;
    rasprover)            ALLOWED="ros_driver/esp32/procpu native_sim/native/64"; DEFAULT="ros_driver/esp32/procpu" ;;
    *) echo "unknown app: ${app}" >&2; exit 2 ;;
esac

BOARD="${board:-$DEFAULT}"
if ! printf '%s\\n' $ALLOWED | grep -qx "$BOARD"; then
    echo "board '$BOARD' not allowed for ${app}" >&2
    echo "allowed: $ALLOWED" >&2
    exit 2
fi

EXTRA=""
case "${sysbuild}" in true|True|1|yes) EXTRA="--sysbuild" ;; esac

west build -b "$BOARD" -p always $EXTRA --build-dir builds/${app} applications/${app}
"""
args = [
    { name = "app", positional = true, help = "App name (motor_controller, joystick_controller, embedded_vision, force_sensor, rasprover)" },
    { name = "board", options = ["-b", "--board"], help = "Override target board (must be in app's allowed list)" },
    { name = "sysbuild", type = "boolean", help = "Build with sysbuild (e.g. for MCUboot integration)" },
]
help = "Build a Zephyr application for its default (or an explicitly allowed) board."

[tool.poe.tasks.flash]
cmd = "west flash --build-dir builds/${app}"
args = [
    { name = "app", positional = true, help = "App name (e.g. motor_controller)" }
]
help = "Flash a previously built application."

[tool.poe.tasks.run-rasprover-sim]
cmd = "west build -b native_sim/native/64 --build-dir builds/rasprover -t run applications/rasprover"
help = "Run an already-built native_sim rasprover image."

# pico_fw requires its own west workspace (see applications/pico_fw/west.yml).
# It cannot be built from this workspace due to the cyw43 module conflict.

[tool.poe.tasks.agent-build]
shell = """
set -e
mkdir -p logs
TAIL_S="${TAIL_S:-5}"
TAIL_F="${TAIL_F:-50}"
LOG="logs/${app}-build.log"

ARGS=""
[ -n "${board}" ] && ARGS="$ARGS --board ${board}"
case "${sysbuild}" in true|True|1|yes) ARGS="$ARGS --sysbuild" ;; esac

if uv run poe app $ARGS ${app} > "$LOG" 2>&1; then
    echo "Build succeeded"
    tail -$TAIL_S "$LOG"
else
    EXIT_CODE=$?
    echo "Build failed (exit code: $EXIT_CODE)"
    tail -$TAIL_F "$LOG"
    exit $EXIT_CODE
fi
"""
args = [
    { name = "app", positional = true, help = "App name (e.g. motor_controller)" },
    { name = "board", options = ["-b", "--board"], help = "Override target board" },
    { name = "sysbuild", type = "boolean", help = "Build with sysbuild" },
]
help = "Build with tail-truncated log output. Usage: [TAIL_S=5] [TAIL_F=50] uv run poe agent-build [--board <board>] [--sysbuild] <app>"
