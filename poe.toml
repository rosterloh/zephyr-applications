[tool.poe]
envfile = "${POE_ROOT}/.env"

[tool.poe.tasks]
fmt = "ruff format"

[tool.poe.tasks.setup]
sequence = ["west-update", "sdk-install", "blobs-fetch", "patch-zenoh"]
help = "First-time workspace setup: fetch west deps, install Zephyr SDK, fetch binary blobs, apply patches. Safe to re-run."

[tool.poe.tasks.west-update]
cmd = "west update --narrow"
help = "Fetch/update all west dependencies into deps/"

[tool.poe.tasks.blobs-fetch]
cmd = "west blobs fetch hal_espressif"
help = "Fetch required binary blobs for the Espressif HAL (WiFi/BLE firmware)."

[tool.poe.tasks.patch-zenoh]
shell = '''
set -e
CMAKE="${POE_ROOT}/deps/modules/lib/zenoh/zephyr/CMakeLists.txt"
if grep -q 'src/runtime' "$CMAKE"; then
    echo "zenoh runtime patch already applied"
else
    sed -i '/src\/utils/a\  "../src/runtime/*.c"' "$CMAKE"
    echo "zenoh runtime patch applied (src/runtime/*.c added to zenoh Zephyr module)"
fi
'''
help = "Patch zenoh-pico Zephyr CMakeLists.txt to include missing src/runtime/ sources. Idempotent."

[tool.poe.tasks.sdk-install]
shell = """
set -e
SDK_VER=$(cat "${POE_ROOT}/deps/zephyr/SDK_VERSION")
west sdk install --version "$SDK_VER" \
  -t arm-zephyr-eabi \
     riscv64-zephyr-elf \
     xtensa-espressif_esp32_zephyr-elf \
     xtensa-espressif_esp32s3_zephyr-elf
"""
help = "Install Zephyr SDK toolchains for this project's targets (version read from deps/zephyr/SDK_VERSION)."

[tool.poe.tasks.build]
cmd = "west build -b ${MY_BOARD} -p always --build-dir builds/${proj} ${proj}"
args = [
    { name = "proj", positional = true, help = "Application to build (e.g. applications/joystick_controller)" }
]
help = "Build a Zephyr application. Set MY_BOARD in .env or environment."

[tool.poe.tasks.flash]
cmd = "west flash --build-dir builds/${proj}"
args = [
    { name = "proj", positional = true, help = "Application to flash (e.g. applications/joystick_controller)" }
]
help = "Flash a previously built application."

[tool.poe.tasks.build-rasprover]
cmd = "west build -b ros_driver/esp32/procpu -p always --sysbuild --build-dir builds/rasprover applications/rasprover"
help = "Build rasprover (+ MCUboot) for the Waveshare ROS Driver (ESP32)."

[tool.poe.tasks.sim-rasprover]
cmd = "west build -b native_sim/native/64 -p always --build-dir builds/rasprover_sim applications/rasprover"
help = "Build rasprover UI simulator (64-bit native_sim + SDL display)."

[tool.poe.tasks.run-rasprover-sim]
cmd = "west build -b native_sim/native/64 --build-dir builds/rasprover_sim -t run applications/rasprover"
help = "Run an already-built native_sim rasprover image."

[tool.poe.tasks.build-vision]
cmd = "west build -b arduino_nicla_vision/stm32h747xx/m7 -p always --build-dir builds/embedded_vision applications/embedded_vision"
help = "Build embedded_vision for arduino_nicla_vision."

[tool.poe.tasks.build-force]
cmd = "west build -b adafruit_qt_py_esp32c3 -p always --build-dir builds/force_sensor applications/force_sensor"
help = "Build force_sensor for adafruit_qt_py_esp32c3."

[tool.poe.tasks.build-joystick]
cmd = "west build -b adafruit_qt_py_esp32s3/esp32s3/procpu -p always --build-dir builds/joystick_controller applications/joystick_controller"
help = "Build joystick_controller for adafruit_qt_py_esp32s3."

[tool.poe.tasks.build-motor]
cmd = "west build -b robotis_openrb_150 -p always --build-dir builds/motor_controller applications/motor_controller"
help = "Build motor_controller for robotis_openrb_150."

# pico_fw requires its own west workspace (see applications/pico_fw/west.yml).
# It cannot be built from this workspace due to the cyw43 module conflict.
# [tool.poe.tasks.build-pico]

[tool.poe.tasks.agent-build]
shell = """
set -e
mkdir -p logs
TAIL_S="${TAIL_S:-5}"
TAIL_F="${TAIL_F:-50}"
if uv run west build -b ${MY_BOARD} -p always --build-dir builds/${proj} ${proj} > logs/${proj##*/}-build.log 2>&1; then
    echo "Build succeeded"
    tail -$TAIL_S logs/${proj##*/}-build.log
    exit 0
else
    EXIT_CODE=$?
    echo "Build failed (exit code: $EXIT_CODE)"
    tail -$TAIL_F logs/${proj##*/}-build.log
    exit $EXIT_CODE
fi
"""
args = [
    { name = "proj", positional = true, help = "Application path (e.g. applications/joystick_controller)" }
]
help = "Build with tail-truncated log output. Usage: [TAIL_S=5] [TAIL_F=50] uv run poe agent-build <proj>"
