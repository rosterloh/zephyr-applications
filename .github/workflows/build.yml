name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: applications/joystick_controller
            board: adafruit_qt_py_esp32s3/esp32s3/procpu
          - app: applications/motor_controller
            board: robotis_openrb_150
          # rasprover depends on golioth + pouch which are excluded from the
          # west-project-filter until pouch updates its board.yml.
          # - app: applications/rasprover
          #   board: ros_driver/esp32/procpu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync

      - name: Cache west deps
        uses: actions/cache@v4
        with:
          path: deps/
          key: west-deps-${{ hashFiles('west.yml') }}
          restore-keys: |
            west-deps-

      - name: Cache Zephyr SDK
        uses: actions/cache@v4
        with:
          path: ~/zephyr-sdk-*
          key: zephyr-sdk-${{ hashFiles('west.yml') }}
          restore-keys: |
            zephyr-sdk-

      - name: Setup workspace
        run: uv run poe setup

      - name: Build firmware
        run: |
          uv run west build \
            -b ${{ matrix.board }} \
            -p always \
            --build-dir builds/${{ matrix.app }} \
            ${{ matrix.app }}

  # Re-enable once tests/drivers/seesaw is updated to reference the
  # seesaw driver via the rosterloh-drivers module path.
