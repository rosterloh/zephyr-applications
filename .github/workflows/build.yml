name: Build

on:
  push:
  pull_request:
  #schedule:
  #  - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: applications/joystick_controller
            board: adafruit_qt_py_esp32s3/esp32s3/procpu
          - app: applications/motor_controller
            board: robotis_openrb_150
          # rasprover needs golioth + pouch modules, which are filtered out
          # until pouch updates its board.yml with full_name.
          # Board: ros_driver/esp32/procpu (from rosterloh-drivers)
          # - app: applications/rasprover
          #   board: ros_driver/esp32/procpu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: zephyr-applications

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Setup Zephyr project
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: zephyr-applications
          toolchains: arm-zephyr-eabi:riscv64-zephyr-elf:xtensa-espressif_esp32_zephyr-elf:xtensa-espressif_esp32s3_zephyr-elf
          # TODO: Re-enable pouch and golioth once pouch updates its board.yml
          # to include full_name (required by current Zephyr board schema).
          # Only rasprover and bluetooth_proxy_device depend on these modules.
          west-project-filter: -pouch,-golioth

      - name: Build firmware
        run: west build -p always -b ${{ matrix.board }} zephyr-applications/${{ matrix.app }}

  # TODO: Re-enable test job once tests/drivers/seesaw is fixed.
  # The test references a local drivers/seesaw/ path that doesn't exist —
  # the seesaw driver lives in the rosterloh-drivers external module.
