name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: applications/rasprover
            board: ros_driver/esp32/procpu
            flags: --sysbuild
            # rasprover currently fails on a zenoh-pico/config.h generation
            # issue. Track the failure visibly without blocking unrelated PRs.
            experimental: true
          - app: applications/embedded_vision
            board: arduino_nicla_vision/stm32h747xx/m7
          - app: applications/force_sensor
            board: adafruit_qt_py_esp32c3
          - app: applications/joystick_controller
            board: adafruit_qt_py_esp32s3/esp32s3/procpu
          - app: applications/motor_controller
            board: robotis_openrb_150
          # The following apps require modules not in this workspace:
          # bluetooth_proxy_device: needs golioth/pouch
          #   (disabled until pouch fixes board.yml full_name requirement)
          # pico_fw: needs cyw43 (beechwoods-software) which causes Kconfig
          #   conflicts on non-Pico targets; use applications/pico_fw/west.yml
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental == true }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync

      - name: Cache west deps
        uses: actions/cache@v5
        with:
          path: deps/
          key: west-deps-${{ hashFiles('west.yml') }}
          restore-keys: |
            west-deps-

      - name: Cache Zephyr SDK
        uses: actions/cache@v5
        with:
          path: ~/zephyr-sdk-*
          key: zephyr-sdk-${{ hashFiles('west.yml') }}
          restore-keys: |
            zephyr-sdk-

      - name: Setup workspace
        run: uv run poe setup

      - name: Build firmware
        run: |
          uv run west build \
            -b ${{ matrix.board }} \
            -p always \
            ${{ matrix.flags }} \
            --build-dir builds/${{ matrix.app }} \
            ${{ matrix.app }}

  # Re-enable once tests/drivers/seesaw is updated to reference the
  # seesaw driver via the rosterloh-drivers module path.
