name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: rasprover
            flags: --sysbuild
          - app: embedded_vision
          - app: force_sensor
          - app: joystick_controller
          - app: motor_controller
          # The following apps require modules not in this workspace:
          # bluetooth_proxy_device: needs golioth/pouch
          #   (disabled until pouch fixes board.yml full_name requirement)
          # pico_fw: needs cyw43 (beechwoods-software) which causes Kconfig
          #   conflicts on non-Pico targets; use applications/pico_fw/west.yml
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync

      - name: Cache west deps
        uses: actions/cache@v5
        with:
          path: deps/
          key: west-deps-${{ hashFiles('west.yml') }}
          restore-keys: |
            west-deps-

      - name: Cache Zephyr SDK
        uses: actions/cache@v5
        with:
          path: ~/zephyr-sdk-*
          key: zephyr-sdk-${{ hashFiles('west.yml') }}
          restore-keys: |
            zephyr-sdk-

      - name: Setup workspace
        run: uv run poe setup

      - name: Build firmware
        run: uv run poe app ${{ matrix.app }} ${{ matrix.flags }}
