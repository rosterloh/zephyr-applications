manifest:
  self:
    path: .

  remotes:
    - name: zephyrproject-rtos
      url-base: https://github.com/zephyrproject-rtos
    - name: rosterloh
      url-base: https://github.com/rosterloh
    - name: golioth
      url-base: https://github.com/golioth
    - name: eclipse-zenoh
      url-base: https://github.com/eclipse-zenoh

  projects:
    - name: zephyr
      remote: zephyrproject-rtos
      revision: main
      west-commands: scripts/west-commands.yml
      import:
        path-prefix: deps
        # Clone only the modules strictly needed by these applications.
        name-allowlist:
          - cmsis_6
          - hal_atmel
          - hal_espressif
          - hal_infineon
          - hal_nordic
          - hal_rpi_pico
          - hal_st
          - hal_stm32
          - libmetal
          - lvgl
          - mbedtls
          - mcuboot
          - open-amp
          - segger
          - tf-psa-crypto
          - tfm-mcuboot
          - trusted-firmware-m
          - zcbor

    - name: rosterloh-drivers
      repo-path: zephyr-drivers
      remote: rosterloh
      # Temporarily pinned to the typed-API branch; flip back to `main`
      # once rosterloh/zephyr-drivers#6 merges.
      revision: feature/dynamixel-cleanup
      path: deps/modules/lib/rosterloh-drivers

    # golioth and pouch are needed only by rasprover and bluetooth_proxy_device.
    # Disabled until https://github.com/golioth/pouch adds full_name to its
    # board.yml (required by the current Zephyr board schema).
    # - name: golioth
    #   repo-path: golioth-firmware-sdk
    #   remote: golioth
    #   path: deps/modules/lib/golioth-firmware-sdk
    #   revision: main
    #   submodules: true
    #
    # - name: pouch
    #   path: deps/modules/lib/pouch
    #   revision: main
    #   url: https://github.com/golioth/pouch.git

    - name: zenoh
      repo-path: zenoh-pico
      remote: eclipse-zenoh
      revision: main
      path: deps/modules/lib/zenoh

    # pico_fw uses the cyw43 driver from beechwoods-software for rpi_pico_w.
    # It cannot be integrated into this workspace because the cyw43 module
    # introduces Kconfig conflicts (SPI_RPI_PICO_PIO) on non-Pico targets.
    # Build pico_fw using its own west.yml in applications/pico_fw/.