# Application
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_SHELL=y
CONFIG_REBOOT=y

# Flash and Settings
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_ZMS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_RUNTIME=y

# Firmware upgrade (MCUboot OTA receiver)
CONFIG_STREAM_FLASH=y
CONFIG_IMG_MANAGER=y
CONFIG_IMG_ERASE_PROGRESSIVELY=y
CONFIG_MCUBOOT_IMG_MANAGER=y

# MCUmgr: SMP protocol for OTA image upload and OS management
CONFIG_MCUMGR=y
CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_OS=y

# SMP over shell UART (shares existing console - use mcumgr CLI or nRF Connect)
CONFIG_MCUMGR_TRANSPORT_SHELL=y

# SMP over Bluetooth for wireless OTA
CONFIG_MCUMGR_TRANSPORT_BT=y
CONFIG_MCUMGR_TRANSPORT_BT_REASSEMBLY=y
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="rasprover"
CONFIG_BT_MAX_CONN=1

# Drivers
CONFIG_DISPLAY=y
CONFIG_I2C=y
CONFIG_SENSOR=y

# OLED Display
CONFIG_APP_DISPLAY=y
# CONFIG_LVGL=y
# CONFIG_LV_CONF_MINIMAL=y
CONFIG_LV_Z_MEM_POOL_SIZE=16384
CONFIG_LV_USE_LOG=y
CONFIG_LV_USE_LABEL=y
CONFIG_LV_USE_ARC=y
CONFIG_LV_USE_MONKEY=y
CONFIG_LV_FONT_MONTSERRAT_14=y

# Networking
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_DHCPV4=y
# CONFIG_ESP_HEAP_RUNTIME=n
# CONFIG_NET_LOG=y
# CONFIG_NET_SHELL=y
