# Disable hardware not present on native_sim
CONFIG_BT=n
CONFIG_MCUMGR=n
CONFIG_APP_ZENOH=n
CONFIG_ZENOH_PICO=n
CONFIG_NETWORKING=n
CONFIG_NET_L2_ETHERNET=n
CONFIG_NET_L2_WIFI_MGMT=n
CONFIG_NET_DHCPV4=n
CONFIG_STREAM_FLASH=n
CONFIG_IMG_MANAGER=n
CONFIG_IMG_ERASE_PROGRESSIVELY=n
CONFIG_MCUBOOT_IMG_MANAGER=n
CONFIG_NEWLIB_LIBC=n
CONFIG_POSIX_API=n

# Motors: fake actuators replace the h-bridge hardware
CONFIG_ACTUATOR_HBRIDGE=n
CONFIG_ACTUATOR_HBRIDGE_ENCODER=n
CONFIG_ACTUATOR_FAKE=y
CONFIG_PWM=n

# Native SDL/LVGL allocates larger host-side objects than the OLED target.
CONFIG_LV_Z_MEM_POOL_SIZE=16384

# Enable logging so app_motors: motors ready is visible in sim output
CONFIG_LOG=y
