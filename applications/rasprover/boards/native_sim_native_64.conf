# SDL display matching SSD1306 dimensions, zoomed 4x for visibility
CONFIG_SDL_DISPLAY=y
CONFIG_SDL_DISPLAY_ZOOM_PCT=400
CONFIG_LV_COLOR_DEPTH_32=y

# Disable hardware not present on native_sim
CONFIG_BT=n
CONFIG_MCUMGR=n
CONFIG_APP_ZENOH=n
CONFIG_ZENOH_PICO=n
CONFIG_NETWORKING=n
CONFIG_NET_L2_ETHERNET=n
CONFIG_NET_L2_WIFI_MGMT=n
CONFIG_NET_DHCPV4=n
CONFIG_STREAM_FLASH=n
CONFIG_IMG_MANAGER=n
CONFIG_IMG_ERASE_PROGRESSIVELY=n
CONFIG_MCUBOOT_IMG_MANAGER=n
CONFIG_NEWLIB_LIBC=n
CONFIG_POSIX_API=n
